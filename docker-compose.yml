name: coloring-fun

x-app-env: &app-env
  NODE_ENV: production
  PORT: 3000
  SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL}
  SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-${SUPABASE_URL}}
  SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:?Set SUPABASE_SECRET_KEY}
  AI_KEYS_MASTER_KEY: ${AI_KEYS_MASTER_KEY:?Set AI_KEYS_MASTER_KEY}
  OPENAI_MODERATION_API_KEY: ${OPENAI_MODERATION_API_KEY:-}
  ALLOW_DEGRADED_MODERATION: ${ALLOW_DEGRADED_MODERATION:-false}
  LOCAL_AI_ENABLED: ${LOCAL_AI_ENABLED:-false}
  LOCAL_IMAGE_API_URL: ${LOCAL_IMAGE_API_URL:-http://127.0.0.1:7861}
  COMFYUI_CHECKPOINT: ${COMFYUI_CHECKPOINT:-sd_xl_base_1.0.safetensors}
  COMFYUI_WORKFLOW_PATH: ${COMFYUI_WORKFLOW_PATH:-ColoringBooks.json}
  COMFYUI_DEBUG_PROMPTS: ${COMFYUI_DEBUG_PROMPTS:-false}
  ADMIN_EMAILS: ${ADMIN_EMAILS:-}
  SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
  APP_URL: ${APP_URL:-}
  DAILY_GENERATION_LIMIT: ${DAILY_GENERATION_LIMIT:-20}
  WORKER_POLL_MS: ${WORKER_POLL_MS:-2000}

services:
  web:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:?Set VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:?Set VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_GOOGLE_AUTH_ENABLED: ${VITE_GOOGLE_AUTH_ENABLED:-false}
        VITE_LOCAL_AI_ENABLED: ${VITE_LOCAL_AI_ENABLED:-false}
    image: coloring-fun-app:latest
    restart: unless-stopped
    environment:
      <<: *app-env
    ports:
      - "${PORT:-3000}:3000"

  worker:
    image: coloring-fun-app:latest
    restart: unless-stopped
    command: ["npm", "run", "start:worker"]
    depends_on:
      web:
        condition: service_healthy
    environment:
      <<: *app-env
    healthcheck:
      disable: true
